<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메모장</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f1a;
            color: #e2e8f0;
            font-family: 'NanumGothic', 'Noto Color Emoji', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: #1a1a2e;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a2a4e;
        }

        .topbar h1 {
            font-size: 18px;
            color: #c4b5fd;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #status {
            font-size: 13px;
            color: #6ee7b7;
            min-width: 80px;
            text-align: right;
        }

        .btn {
            padding: 7px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Noto Sans KR', sans-serif;
            cursor: pointer;
            transition: all 0.15s;
        }

        #btn-load {
            background: transparent;
            color: #c4b5fd;
            border: 1px solid #c4b5fd;
        }

        #btn-load:hover {
            background: #2a2a4e;
        }

        #btn-save {
            background: #7c3aed;
            color: white;
        }

        #btn-save:hover {
            background: #6d28d9;
        }

        textarea {
            flex: 1;
            width: 100%;
            background: #0f0f1a;
            color: #e2e8f0;
            border: none;
            padding: 28px 32px;
            font-size: 16px;
            font-family: 'NanumGothic', 'Noto Color Emoji', sans-serif;
            line-height: 2;
            resize: none;
            outline: none;
        }

        .bottombar {
            background: #1a1a2e;
            padding: 8px 24px;
            border-top: 1px solid #2a2a4e;
            font-size: 12px;
            color: #4a4a6a;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>📝 메모장</h1>
        <div class="topbar-right">
            <span id="status"></span>
            <button class="btn" id="btn-load" onclick="load()">불러오기</button>
            <button class="btn" id="btn-save" onclick="save()">저장</button>
        </div>
    </div>

    <textarea id="memo" placeholder="여기에 메모를 입력하세요..."></textarea>

    <div class="bottombar" id="charcount">0 글자</div>

    <script>
        const memo = document.getElementById('memo');

        memo.addEventListener('input', function () {
            document.getElementById('charcount').textContent = memo.value.length + ' 글자';
        });

        function showStatus(msg) {
            const status = document.getElementById('status');
            status.textContent = msg;
            setTimeout(() => { status.textContent = ''; }, 2000);
        }

        function load() {
            pywebview.api.load().then(function (text) {
                memo.value = text;
                document.getElementById('charcount').textContent = text.length + ' 글자';
                showStatus('불러왔어요!');
            });
        }

        function save() {
            pywebview.api.save(memo.value).then(function () {
                showStatus('저장됐어요!');
            });
        }

        window.addEventListener('pywebviewready', load);
    </script>
</body>
</html>
